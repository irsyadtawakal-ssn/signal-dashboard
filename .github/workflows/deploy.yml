name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            git config --global --add safe.directory /opt/signal-dashboard
            cd /opt/signal-dashboard

            git pull origin main

            # Restart backend only if backend files changed
            if git diff --name-only HEAD@{1} HEAD | grep -q '^backend/'; then
              cd backend
              npm ci --omit=dev
              cd ..
              # Restart as creatormpb25 user (where PM2 daemon is)
              su - creatormpb25 -c "cd /opt/signal-dashboard && pm2 restart signal-dashboard"
            fi

            echo "Deploy selesai: $(date)"
