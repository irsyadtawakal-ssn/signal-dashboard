# nginx site config for OCT Signal Dashboard (single-origin).
# Serves the static frontend AND reverse-proxies /api/* to the pm2 backend on :3000.
# Single origin → no CORS needed (leave CORS_ORIGIN unset in backend/.env).
#
# Install:
#   sudo cp deploy/nginx-signal-dashboard.conf /etc/nginx/sites-available/signal-dashboard
#   sudo ln -s /etc/nginx/sites-available/signal-dashboard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then (if you have a domain) add HTTPS:
#   sudo certbot --nginx -d your-domain.com
# (certbot rewrites this file to add the listen 443 / ssl_* lines automatically.)

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain, or use "_" to match any host (IP-only access).
    server_name your-domain.com;

    # Absolute path to the repo's frontend/ folder on the VPS.
    # Adjust if you cloned somewhere else.
    root /var/www/signal-dashboard/frontend;
    index index.html;

    # Reverse-proxy the API to the backend pm2 process (same box, localhost).
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static frontend (vanilla HTML/JS/CSS, no build step).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never serve the gitignored runtime config or dotfiles publicly is N/A
    # (config.js holds only the PUBLIC anon key + relative apiBaseUrl), but
    # block accidental exposure of any stray dotfiles:
    location ~ /\.(?!well-known) {
        deny all;
    }
}
